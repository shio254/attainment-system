<!DOCTYPE html>
<html>
<head>
    <title> Lab Details Entry</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            font-family: Arial, sans-serif;
            padding:20px;
            background:#f4f6f9;
        }
        .container{
            max-width:1200px;
            margin:auto;
            background:white;
            padding:20px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
            border-radius:10px;
        }
        h2,h3{
            text-align:center;
        }
        input{
            padding:8px;
            margin:10px 0;
            width:100%;
            box-sizing:border-box;
        }
        button{
            padding:10px 20px;
            background:#1e3a8a;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }
        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }
        th,td{
            border:1px solid black;
            padding:8px;
            text-align:center;
        }
        th{
            font-weight:bold;
        }
        .top{
            margin-bottom:20px;
        }
    </style>
</head>
<body>
<div class="container">
<h2>FACILITIES AND TECHNICAL SUPPORT</h2>
    <h3> Adequate and Well-equipped Laboratories, and Technical Manpower</h3>
    <div class="top">
        <label>Enter Number of Labs:</label>
        <input type="number" id="numLabs" placeholder="Enter labs">
        <label>Enter Number of Students per Setup:</label>
        <input type="number" id="numStudents" placeholder="Enter students">
        <button onclick="createTable()">Generate Table</button>
    </div>
    <div id="tableContainer"></div>
</div>
<div class="container">
    <h3>Faculty Details Entry</h3>
    <label><b>Enter Number of Faculty:</b></label>
    <input type="number" id="facultyCount" placeholder="Enter faculty count">
    <button onclick="generateFacultyTable()">Generate Table</button>
    <div id="tableContainer"></div>
</div>
<div class="container">
<h3> Safety Measures in Laboratories</h3>
        <label>Enter Number of Labs:</label>
        <input type="number" id="numLabs" placeholder="Enter labs">
        <button onclick="createTable()">Generate Table</button>
     <div id="tableContainer"></div>
</div>

<script>
function createTable() {
    let labs = document.getElementById("numLabs").value;
    let students = document.getElementById("numStudents").value;
    if(labs === "" || students === "") {
        alert("Please enter all details");
        return;
    }
    let html = `
    <table>
        <tr>
            <th rowspan="2">Sl.<br>No.</th>
            <th rowspan="2">Name of the Laboratory</th>
            <th rowspan="2">No. of students per setup<br>(Batch Size)</th>
            <th rowspan="2">Name of the Important equipment</th>
            <th rowspan="2">Weekly utilization status</th>
            <th colspan="3">Technical Manpower support</th>
        </tr>
        <tr>
            <th>Name of technical staff</th>
            <th>Designation</th>
            <th>Qualification</th>
        </tr>
    `;
    for(let i=1; i<=labs; i++){
        html += `
        <tr>
            <td>${i}</td>
            <td><input type="text" placeholder="Lab Name"></td>
            <td>${students}</td>
            <td><input type="text" placeholder="Equipment"></td>
            <td><input type="text" placeholder="Weekly status"></td>
            <td><input type="text" placeholder="Staff Name"></td>
            <td><input type="text" placeholder="Designation"></td>
            <td><input type="text" placeholder="Qualification"></td>
        </tr>
        `;
    }
    html += `</table>`;
    document.getElementById("tableContainer").innerHTML = html;
}
function generateFacultyTable() {
    let count = document.getElementById("facultyCount").value;
    let container = document.getElementById("tableContainer");

    if(count === "" || count <= 0){
        alert("Please enter valid faculty count");
        return;
    }
    let html = `
        <table>
            <tr>
                <th>Sl.No</th>
                <th>Name of Faculty</th>
                <th>Details</th>
                <th>Reason(s) for creating facility</th>
                <th>Utilization</th>
                <th>Area in which students are expected to have enhanced learning</th>
                <th>Relevance to POs/POSs</th>
            </tr>
    `;
    for(let i = 1; i <= count; i++){
        html += `
            <tr>
                <td>${i}</td>
                <td><input type="text" placeholder="Faculty Name"></td>
                <td><input type="text" placeholder="Details"></td>
                <td><input type="text" placeholder="Reason(s) for creating facility"></td>
                <td><input type="text" placeholder="Utilization"></td>
                <td><input type="text" placeholder="Area in which students are expected to have enhanced learning"></td>
                <td><input type="text" placeholder="Relevance to POs/POSs"></td>
            </tr>
        `;
    }
    html += `</table>`;
    container.innerHTML = html;
}
function createTable() {
    let labs = document.getElementById("numLabs").value;
    let container = document.getElementById("tableContainer");

    if (labs === "" || labs <= 0) {
        alert("Please enter valid number of labs");
        return;
    }
    let html = `
        <table border="1" style="width:100%; border-collapse:collapse; margin-top:20px; text-align:center;">
            <tr>
                <th>Sl. No.</th>
                <th>Name of the Laboratory</th>
                <th>Safety Measures</th>
            </tr>
    `;
    for (let i = 1; i <= labs; i++) {
        html += `
            <tr>
                <td>${i}</td>
                <td><input type="text" placeholder="Enter Lab Name"></td>
                <td><input type="text" placeholder="Enter Safety Measures"></td>
            </tr>
        `;
    }
    html += `</table>`;
    container.innerHTML = html;
}
</script>
</body>
</html>
