<!DOCTYPE html>
<html>
<head>
    <title>NBA Lab Details Entry</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            font-family: Arial, sans-serif;
            padding:20px;
            background:#f4f6f9;
        }
        .container{
            max-width:1200px;
            margin:auto;
            background:white;
            padding:20px;
            margin-bottom:20px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
            border-radius:10px;
        }
        h2,h3{
            text-align:center;
        }
        input{
            padding:8px;
            margin:10px 0;
            width:100%;
            box-sizing:border-box;
        }
        button{
            padding:10px 20px;
            background:#1e3a8a;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }
        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }
        th,td{
            border:1px solid black;
            padding:8px;
            text-align:center;
        }
    </style>
</head>
<body>

<!-- FIRST TABLE -->
<div class="container">
    <h2>FACILITIES AND TECHNICAL SUPPORT</h2>
    <h3>Adequate and Well-equipped Laboratories</h3>
    <label>Enter Number of Labs:</label>
    <input type="number" id="labCount1">
    <button onclick="generateLabTable()">Generate Table</button>
    <div id="tableContainer1"></div>
</div>
<!-- SECOND TABLE -->
<div class="container">
    <h3>Additional Facilities Created</h3>
    <label>Enter Number of Facility:</label>
    <input type="number" id="facilityCount">
    <button onclick="generateFacilityTable()">Generate Table</button>
    <div id="tableContainer2"></div>
</div>
<!-- THIRD TABLE -->
<div class="container">
    <h3>Safety Measures in Laboratories</h3>
    <label>Enter Number of Labs:</label>
    <input type="number" id="labCount3">
    <button onclick="generateSafetyTable()">Generate Table</button>
    <div id="tableContainer3"></div>
</div>
<!-- FOURTH TABLE -->
<div class="container">
    <h3>Laboratories Maintenance and Overall Ambiance</h3>
    <label>Enter Number of Labs:</label>
    <input type="number" id="labCount4">
    <button onclick="generateMaintenanceTable()">Generate Table</button>    
<div id="tableContainer4"></div>
</div>
<!-- FIVTH TABLE -->
<div class="container">
    <h3>Project Laboratory </h3>
    <label>Enter Number of Facility:</label>
    <input type="number" id="facilityCount1">
    <button onclick="generateLaboratoryTable()">Generate Table</button>
    <div id="tableContainer5"></div>
</div>

<div style="max-width:1200px; margin:0 auto 20px; text-align:right;">
    <a href="/development">
        <button type="button">Go to Development</button>
    </a>
</div>

<script>
(function () {
    const isStaticMode = window.location.protocol === "file:" ||
        window.location.pathname.endsWith(".html") ||
        window.location.pathname.includes("/templates/");

    if (!isStaticMode) {
        return;
    }

    document.addEventListener("DOMContentLoaded", function () {
        const routeToFile = {
            "/development": "development.html"
        };

        document.querySelectorAll("a[href]").forEach(function (link) {
            const target = link.getAttribute("href");
            if (routeToFile[target]) {
                link.setAttribute("href", routeToFile[target]);
            }
        });
    });
})();

function generateLabTable() {
    let labs = document.getElementById("labCount1").value;

    if(labs === "" || labs <= 0) {
        alert("Please enter number of labs");
        return;
    }

    let html = `
    <table>
        <tr>
            <th>Sl.No</th>
            <th>Lab Name</th>
            <th>Name of important Equipment</th>
            <th>Weekly Status</th>
            <th>Technical staff name</th>
            <th>Designation</th>
            <th>Qualification</th>
        </tr>
    `;

    for(let i=1; i<=labs; i++){
        html += `
        <tr>
            <td>${i}</td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
        </tr>
        `;
    }

    html += `</table>`;
    document.getElementById("tableContainer1").innerHTML = html;
}
function generateFacilityTable() {
    let count = document.getElementById("facilityCount").value;
    if(count === "" || count <= 0){
        alert("Please enter valid facility count");
        return;
    }
    let html = `
    <table>
        <tr>
            <th>Sl.No</th>
            <th>Name of Facility</th>
            <th>Details</th>
            <th>Reason(s) for creating facility</th>
            <th>Utilization</th>
            <th>Area in which students are expected to have Enhanced Learning</th>
            <th>Relevance to POs/PSOs</th>
        </tr>
    `;
    for(let i=1; i<=count; i++){
        html += `
        <tr>
            <td>${i}</td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
        </tr>
        `;
    }
    html += `</table>`;
    document.getElementById("tableContainer2").innerHTML = html;
}
function generateSafetyTable() {
    let labs = document.getElementById("labCount3").value;
    if(labs === "" || labs <= 0){
        alert("Please enter valid number of labs");
        return;
    }
    let html = `
    <table>
        <tr>
            <th>Sl.No</th>
            <th>Name of Laboratory</th>
            <th>Safety Measures</th>
        </tr>
    `;
    for(let i=1; i<=labs; i++){
        html += `
        <tr>
            <td>${i}</td>
            <td><input type="text"></td>
            <td><input type="text"></td>
        </tr>
        `;
    }
    html += `</table>`;
    document.getElementById("tableContainer3").innerHTML = html;
}
function generateMaintenanceTable() {
    let labs = document.getElementById("labCount4").value;
    if(labs === "" || labs <= 0) {
        alert("Please enter number of labs");
        return;
    }
    let html = `
    <table>
        <tr>
            <th>Sl.No</th>
            <th>Name Laboratory</th>
            <th>Maintenance Practices</th>
            <th>Frequency</th>
            <th>Responsible Person/Agency</th>
            <th>Ambiance Features</th>
            <th>Remarks</th>
            </tr>
    `;
    for(let i=1; i<=labs; i++){
        html += `
        <tr>
            <td>${i}</td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
           </tr>
        `;
    }
    html += `</table>`;
    document.getElementById("tableContainer4").innerHTML = html;
}
function generateLaboratoryTable() {
    let count = document.getElementById("facilityCount1").value;
    if(count === "" || count <= 0){
        alert("Please enter valid facility count");
        return;
    }
    let html = `
    <table>
        <tr>
            <th>Sl.No</th>
            <th>Facility/Resource Available</th>
            <th>Description</th>
            <th>Utilization</th>
            <th>No. of Students Benefited</th>
            <th>Software/Tools Used</th>
            <th>Outcome/Impact</th>
        </tr>
    `;
    for(let i=1; i<=count; i++){
        html += `
        <tr>
            <td>${i}</td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
        </tr>
        `;
    }
    html += `</table>`;
    document.getElementById("tableContainer5").innerHTML = html;
}


</script>
</body>
</html>
